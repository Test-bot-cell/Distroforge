remove_packages = []
branding_name = "LMDE-style DistroForge"
branding_vendor = "DistroForge"
branding_os_id = "distroforge-lmde"
branding_id_like = "linuxmint debian"
grub_theme = "/usr/share/grub/themes/linuxmint/theme.txt"

