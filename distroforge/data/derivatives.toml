[derivatives.mint-ubuntu]
label = "Linux Mint style (Ubuntu base)"
description = "Ubuntu-based Mint-like derivative profile with Mint repositories, identity packages and Ubiquity-style installer intent."
base_family = "ubuntu"
base_release = "24.04"
base_codename = "noble"
mint_release = "zena"
installer = "ubiquity"
live_session = "mint-live-session"
hardware_channel = "lts"
repositories = [
  "deb [signed-by=/usr/share/keyrings/linuxmint-keyring.gpg] https://packages.linuxmint.com zena main upstream import backport romeo",
]
keyring_packages = ["linuxmint-keyring"]
identity_packages = [
  "mintsystem",
  "mint-live-session",
  "mint-artwork",
  "mint-themes",
  "grub2-theme-mint",
]
desktop_packages = [
  "cinnamon-core",
  "cinnamon-desktop-environment",
  "nemo",
  "xapps-common",
]
installer_packages = ["ubiquity", "ubiquity-frontend-gtk"]
remove_packages = ["ubuntu-desktop", "ubuntu-session"]
branding_name = "Mint-style DistroForge"
branding_vendor = "DistroForge"
branding_os_id = "distroforge-mint"
branding_id_like = "linuxmint ubuntu debian"
grub_theme = "/usr/share/grub/themes/linuxmint/theme.txt"

